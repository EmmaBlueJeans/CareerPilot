{% extends "base.html" %}
{% block title %}Log in — CareerPilot{% endblock %}

{% block content %}
<div class="page-head">
  <span class="eyebrow">Welcome back</span>
  <h1>Log in to CareerPilot</h1>
  <p class="page-sub">Don't have an account? <a href="{{ url_for('auth.register') }}" class="link">Sign up free</a></p>
</div>

<div class="card screen-form" style="max-width:460px; margin:0 auto;">
  <form method="POST">
    <div class="form-block" style="margin-bottom:16px;">
      <label class="label" for="email">Email</label>
      <input class="input" type="email" id="email" name="email" required autofocus placeholder="you@example.com">
    </div>
    <div class="form-block" style="margin-bottom:24px;">
      <label class="label" for="password">Password</label>
      <input class="input" type="password" id="password" name="password" required placeholder="••••••••">
    </div>
    <button class="btn btn-primary" type="submit" style="width:100%;">Log in</button>
  </form>
</div>
<p style="text-align:center; margin-top:16px; font-size:13px; color:var(--text-3);">
    Forgot your password? 
    <a href="mailto:denemm06002@student.edmonds.edu?subject=CareerPilot password reset" 
       class="link">Contact us</a>
</p>
{% endblock %}
