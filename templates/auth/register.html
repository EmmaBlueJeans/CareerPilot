{% extends "base.html" %}
{% block title %}Create account — CareerPilot{% endblock %}

{% block content %}
<div class="page-head">
  <span class="eyebrow">Get started</span>
  <h1>Create your account</h1>
  <p class="page-sub">Already have an account? <a href="{{ url_for('auth.login') }}" class="link">Log in</a></p>
</div>

<div class="card screen-form" style="max-width:460px; margin:0 auto;">
  <form method="POST">
    <div class="form-block" style="margin-bottom:16px;">
      <label class="label" for="email">Email</label>
      <input class="input" type="email" id="email" name="email" required autofocus placeholder="you@example.com">
    </div>
    <div class="form-block" style="margin-bottom:16px;">
      <label class="label" for="password">Password</label>
      <input class="input" type="password" id="password" name="password" required placeholder="At least 8 characters">
    </div>
    <div class="form-block" style="margin-bottom:24px;">
      <label class="label" for="confirm">Confirm password</label>
      <input class="input" type="password" id="confirm" name="confirm" required placeholder="••••••••">
    </div>
    <button class="btn btn-primary" type="submit" style="width:100%;">Create account</button>
  </form>
</div>
{% endblock %}
